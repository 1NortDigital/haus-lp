    <!-- ====== POPUP + MOTOR DE CONVERSÃO (1Nort) ====== -->
    <style>
      #haus-modal-ov{position:fixed;inset:0;background:rgba(1,5,21,.88);backdrop-filter:blur(6px);z-index:99999;display:none;align-items:center;justify-content:center;padding:20px;font-family:'IBM Plex Sans',sans-serif}
      #haus-modal-ov.open{display:flex}
      #haus-modal{background:#fff;border-radius:20px;padding:34px 30px;max-width:460px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.55);position:relative;max-height:94vh;overflow-y:auto;animation:hausIn .25s ease}
      @keyframes hausIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
      #haus-modal .hx{position:absolute;top:14px;right:14px;background:#eceff4;border:none;border-radius:50%;width:34px;height:34px;font-size:17px;cursor:pointer;color:#475066;line-height:1}
      #haus-modal .htag{display:inline-flex;align-items:center;gap:7px;background:rgba(243,130,29,.12);color:#d96d0e;font-size:11.5px;font-weight:700;letter-spacing:.5px;padding:5px 13px;border-radius:20px;margin-bottom:13px;font-family:'Sora',sans-serif}
      #haus-modal h3{font-family:'Sora',sans-serif;font-size:23px;color:#071123;margin:0 0 5px;font-weight:800}
      #haus-modal .hsub{font-size:13.5px;color:#67738a;margin:0 0 20px}
      #haus-modal .hfg{margin-bottom:13px}
      #haus-modal label{display:block;font-family:'Sora',sans-serif;font-size:12.5px;font-weight:600;color:#475066;margin-bottom:6px}
      #haus-modal input,#haus-modal select{width:100%;padding:13px 15px;background:#f4f6f9;border:1.5px solid #e0e5ec;border-radius:11px;color:#101a2c;font-family:'IBM Plex Sans',sans-serif;font-size:15px;box-sizing:border-box;transition:border-color .2s}
      #haus-modal input:focus,#haus-modal select:focus{outline:none;border-color:#f3821d;background:#fff}
      #haus-modal optgroup{font-weight:700;color:#071123}
      #haus-modal .hbtn{width:100%;padding:16px;background:#f3821d;color:#fff;font-family:'Sora',sans-serif;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:9px;transition:background .2s}
      #haus-modal .hbtn:hover{background:#d96d0e}
      #haus-modal .hbtn.loading{opacity:.7;pointer-events:none}
      #haus-modal .hspin{width:19px;height:19px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:hausSpin .7s linear infinite;display:none}
      @keyframes hausSpin{to{transform:rotate(360deg)}}
      #haus-modal .hpriv{font-size:11.5px;color:#97a2b4;text-align:center;margin:11px 0 0}
      #haus-modal .herr{font-size:12px;color:#DC2626;margin-top:4px;display:none}
      #haus-modal .herr.show{display:block}

    <!-- POPUP (formulário) -->
    <div id="haus-modal-ov" role="dialog" aria-modal="true" aria-labelledby="haus-modal-title">
      <div id="haus-modal">
        <button class="hx" type="button" aria-label="Fechar" onclick="hausFecharModal()">✕</button>
        <span class="htag"><i class="fa fa-sun-o" aria-hidden="true"></i> Orçamento gratuito</span>
        <h3 id="haus-modal-title">Solicite seu orçamento solar</h3>
        <p class="hsub">Preencha seus dados e receba uma simulação personalizada no seu WhatsApp.</p>
        <form id="hausForm" onsubmit="hausSubmit(event)">
          <div class="hfg"><label for="h-nome">Nome completo *</label><input type="text" id="h-nome" placeholder="Seu nome" required autocomplete="name"></div>
          <div class="hfg"><label for="h-tel">WhatsApp *</label><input type="tel" id="h-tel" placeholder="(48) 9 0000-0000" required inputmode="tel" autocomplete="tel"><div class="herr" id="h-tel-err">Informe um telefone válido com DDD.</div></div>
          <div class="hfg"><label for="h-cidade">Cidade *</label>
            <select id="h-cidade" required>
              <option value="">Selecione...</option>
              <optgroup label="Grande Florianópolis">
                <option>Florianópolis</option>
                <option>São José</option>
                <option>Palhoça</option>
                <option>Biguaçu</option>
                <option>Santo Amaro da Imperatriz</option>
                <option>Governador Celso Ramos</option>
                <option>Águas Mornas</option>
                <option>Antônio Carlos</option>
                <option>São Pedro de Alcântara</option>
              </optgroup>
              <optgroup label="Outras"><option>Outra cidade de SC</option></optgroup>
            </select>
          </div>
          <div class="hfg"><label for="h-projeto">Tipo de projeto *</label>
            <select id="h-projeto" required>
              <option value="">Selecione...</option>
              <option>Residencial (On-Grid)</option>
              <option>Comercial / Empresarial</option>
              <option>Rural / Produtor rural</option>
              <option>Sistema Híbrido com Baterias</option>
              <option>Armazenamento de Energia</option>
              <option>Não sei / Quero orientação</option>
            </select>
          </div>
          <button type="submit" class="hbtn" id="h-btn">
            <span id="h-btn-txt"><i class="fa fa-sun-o" aria-hidden="true"></i> RECEBER MEU ORÇAMENTO</span>
            <span class="hspin" id="h-spin"></span>
          </button>
        </form>
        <p class="hpriv"><i class="fa fa-lock" aria-hidden="true"></i> Seus dados estão seguros. Não enviamos spam.</p>
      </div>
    </div>

    <!-- MOTOR DE CONVERSÃO + INTERCEPTAÇÃO DOS BOTÕES WHATSAPP -->
    <script>
    window.dataLayer = window.dataLayer || [];
    (function(){
      // ===== CONFIG Haus Energie =====
      var WEBHOOK='https://webhooks.matheusscherrer.com.br/webhook/landing-page';
      var SHEET_BACKUP=''; // <- colar a URL /exec do Apps Script depois de implantar
      var WHATSAPP_NUMBER='5548984445605';
      var PAGINA='lp-haus';
      var CLICKUP_CLIENT_ID='86aeqqegj';

      // ===== UTM & cookies =====
      function getUTMs(){var p=new URLSearchParams(location.search);return{utm_source:p.get('utm_source')||'',utm_medium:p.get('utm_medium')||'',utm_campaign:p.get('utm_campaign')||'',utm_content:p.get('utm_content')||'',utm_term:p.get('utm_term')||p.get('utm_keyword')||'',gclid:p.get('gclid')||'',fbclid:p.get('fbclid')||'',page_url:location.href.split('#')[0],page_referer:document.referrer||''};}
      function setCookie(k,v,d){d=d||30;var e=new Date(Date.now()+d*864e5).toUTCString();document.cookie=k+'='+encodeURIComponent(v)+';expires='+e+';path=/;SameSite=Lax';}
      function getCookie(k){var m=document.cookie.match(new RegExp('(?:^|; )'+k+'=([^;]*)'));return m?decodeURIComponent(m[1]):'';}
      function saveUTMs(){var u=getUTMs();for(var k in u){if(u[k])setCookie('haus_'+k,u[k]);}if(!getCookie('haus_landing_url'))setCookie('haus_landing_url',u.page_url);}
      function mergeUTMs(){var url=getUTMs(),m={},ks=['utm_source','utm_medium','utm_campaign','utm_content','utm_term','gclid','fbclid'];for(var i=0;i<ks.length;i++){m[ks[i]]=url[ks[i]]||getCookie('haus_'+ks[i])||'';}m.page_url=url.page_url;m.page_referer=url.page_referer;m.landing_url=getCookie('haus_landing_url')||url.page_url;return m;}
      function getIP(){return fetch('https://api.ipify.org?format=json',{cache:'no-cache'}).then(function(r){return r.json();}).then(function(d){return d.ip||'';}).catch(function(){return '';});}
      saveUTMs();

      // ===== webhook + planilha =====
      function sendWebhook(payload){
        if(CLICKUP_CLIENT_ID)payload.clickup_client_id=CLICKUP_CLIENT_ID;
        if(SHEET_BACKUP){try{fetch(SHEET_BACKUP,{method:'POST',mode:'no-cors',keepalive:true,body:JSON.stringify(payload)});}catch(e){}}
        if(!WEBHOOK)return Promise.resolve(false);
        var opts={method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)};
        return fetch(WEBHOOK,opts).then(function(){return true;}).catch(function(){try{fetch(WEBHOOK,Object.assign({keepalive:true},opts));}catch(e){}return false;});
      }

      // ===== máscara telefone =====
      function mask(el){el.addEventListener('input',function(){
        var d=this.value.replace(/\D/g,'');
        if(d.length>11&&d.slice(0,2)==='55')d=d.slice(2); // remove DDI 55 colado (+55...)
        d=d.slice(0,11);
        var out=d;
        if(d.length>7){out='('+d.slice(0,2)+') '+(d.length===11?d.slice(2,7)+'-'+d.slice(7):d.slice(2,6)+'-'+d.slice(6));}
        else if(d.length>6){out='('+d.slice(0,2)+') '+d.slice(2,6)+'-'+d.slice(6);}
        else if(d.length>2){out='('+d.slice(0,2)+') '+d.slice(2);}
        else if(d.length>0){out='('+d;}
        this.value=out;
      });}
      function validPhone(p){return p.replace(/\D/g,'').length>=10;}

      // ===== modal =====
      var ov=document.getElementById('haus-modal-ov');
      window.hausAbrirModal=function(){ov.classList.add('open');document.body.style.overflow='hidden';var n=document.getElementById('h-nome');if(n)setTimeout(function(){n.focus();},60);};
      window.hausFecharModal=function(){ov.classList.remove('open');document.body.style.overflow='';};
      ov.addEventListener('click',function(e){if(e.target===ov)hausFecharModal();});
      document.addEventListener('keydown',function(e){if(e.key==='Escape')hausFecharModal();});
      mask(document.getElementById('h-tel'));

      window.hausSubmit=function(e){
        e.preventDefault();
        var nome=document.getElementById('h-nome').value;
        var tel=document.getElementById('h-tel').value;
        var cidade=document.getElementById('h-cidade').value;
        var projeto=document.getElementById('h-projeto').value;
        var err=document.getElementById('h-tel-err');err.classList.remove('show');
        if(!validPhone(tel)){err.classList.add('show');return;}
        if(!cidade){alert('Selecione sua cidade.');return;}
        if(!projeto){alert('Selecione o tipo de projeto.');return;}
        var btn=document.getElementById('h-btn');btn.classList.add('loading');
        document.getElementById('h-btn-txt').style.display='none';document.getElementById('h-spin').style.display='inline-block';
        getIP().then(function(ip){
          var utms=mergeUTMs();
          var payload=Object.assign({form_type:'modal_orcamento',pagina:PAGINA,nome:nome,telefone:tel,cidade:cidade,tipo_projeto:projeto,ip:ip},utms,{timestamp:new Date().toISOString()});
          setCookie('haus_lead',JSON.stringify(payload),30);
          return sendWebhook(payload).then(function(){
            dataLayer.push({event:'lead_gerado',form_type:'modal',telefone:tel,cidade:cidade,tipo_projeto:projeto});
            var msg=encodeURIComponent('Olá Haus Energie!\n\nVim pelo site e quero meu orçamento de energia solar.\n\n*Nome:* '+nome+'\n*Telefone:* '+tel+'\n*Cidade:* '+cidade+'\n*Tipo de projeto:* '+projeto);
            window.open('https://wa.me/'+WHATSAPP_NUMBER+'?text='+msg,'_blank');
            hausFecharModal();btn.classList.remove('loading');
            document.getElementById('h-btn-txt').style.display='';document.getElementById('h-spin').style.display='none';
            document.getElementById('hausForm').reset();
          });
        });
      };

      // ===== INTERCEPTA TODOS OS BOTÕES/LINKS DE WHATSAPP -> abre o popup =====
      function isWpp(a){if(!a)return false;var h=(a.getAttribute('href')||'').toLowerCase();return h.indexOf('wa.me')>-1||h.indexOf('api.whatsapp')>-1||h.indexOf('whatsapp.com/send')>-1||h.indexOf('5548984445605')>-1;}
      document.addEventListener('click',function(e){
        var a=e.target.closest && e.target.closest('a,button');
        if(!a)return;
        // link direto de whatsapp OU o botão flutuante (fa-whatsapp)
        var icon=a.querySelector&&a.querySelector('.fa-whatsapp');
        if(isWpp(a)||(icon&&isWpp(a))){
          e.preventDefault();e.stopPropagation();hausAbrirModal();
        }
      },true);
    })();
    </script>
  </body>
